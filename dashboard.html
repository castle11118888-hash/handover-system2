<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>後台 B4.1.13</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f6fa}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:10px}
button{margin:5px}
</style>
</head>
<body>

<h2>交接管理後台</h2>

<input id="taskInput" placeholder="輸入交接事項">
<button onclick="addTask()">新增</button>

<div id="list"></div>

<br>
<button onclick="logout()">登出</button>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")||"[]");

function save(){
 localStorage.setItem("tasks",JSON.stringify(tasks));
}

function addTask(){
 const t=document.getElementById("taskInput").value;
 if(!t)return;
 tasks.push({text:t,read:false});
 document.getElementById("taskInput").value="";
 save();
 render();
}

function toggle(i){
 tasks[i].read=!tasks[i].read;
 save();
 render();
}

function del(i){
 tasks.splice(i,1);
 save();
 render();
}

function render(){
 let html="";
 tasks.forEach((t,i)=>{
  html+=`
  <div class="card">
   <b>${t.text}</b><br>
   狀態：${t.read?"已讀":"未讀"}<br>
   <button onclick="toggle(${i})">切換</button>
   <button onclick="del(${i})">刪除</button>
  </div>`;
 });
 document.getElementById("list").innerHTML=html;
}

function logout(){
 location.href="index.html";
}

render();
</script>

</body>
</html>
