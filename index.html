<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>交接管理系統 B4.1.13</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;font-family:sans-serif;background:#f3f4f6}
.container{display:flex;gap:20px;padding:20px}
.left{flex:2;background:linear-gradient(135deg,#1e3a8a,#3b82f6);color:#fff;padding:30px;border-radius:16px}
.right{flex:1;background:#fff;padding:20px;border-radius:16px}
input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ddd}
.btn{padding:12px;border:none;border-radius:8px;width:100%;cursor:pointer;margin-top:10px}
.login{background:#0f172a;color:#fff}
.forget{background:#eee}
</style>
</head>
<body>

<div class="container">
<div class="left">
<h1>今日天氣資訊</h1>
<h2>26°</h2>
<p>多雲到晴・夜間舒適</p>
</div>

<div class="right">
<h2>入口</h2>
<input id="email" type="email" placeholder="請輸入 Email">
<input id="password" type="password" placeholder="至少 6 碼">
<button class="btn login" onclick="login()">登入</button>
<button class="btn forget">忘記密碼</button>
<p id="msg" style="color:red;"></p>
</div>
</div>

<script>
window.onload = () => {
  const saved = localStorage.getItem("email");
  if(saved){
    document.getElementById("email").value = saved;
  }
};

function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(email === "admin690607@gmail.com" && password === "123456"){
    localStorage.setItem("email", email);
    window.location.href = "dashboard.html";
  }else{
    document.getElementById("msg").innerText = "帳號或密碼錯誤";
  }
}
</script>

<div style="position:fixed;bottom:10px;left:10px;font-size:12px;color:#666">
版本：B4.1.13
</div>

</body>
</html>
