<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>交接系統 B4.1.12</title>
<style>
body { font-family: Arial; text-align:center; margin-top:50px; }
input { padding:8px; margin:5px; width:200px; }
button { padding:10px 20px; margin-top:10px; }
#dashboard { display:none; }
.card { border:1px solid #ccc; padding:10px; margin:10px auto; width:300px; }
</style>
</head>

<body>

<div id="login">
  <h2>入口 / 登入</h2>
  <input id="email" placeholder="帳號"><br>
  <input id="password" type="password" placeholder="密碼"><br>
  <button onclick="login()">登入</button>
</div>

<div id="dashboard">
  <h2>後台首頁 (B4.1.12)</h2>
  <p>系統正常運作 ✅</p>

  <h3>新增交接事項</h3>
  <input id="taskInput" placeholder="輸入內容">
  <button onclick="addTask()">新增</button>

  <h3>交接列表</h3>
  <div id="taskList"></div>

  <br>
  <button onclick="logout()">登出</button>
</div>

<script>
let tasks = [];

function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  if(email === "admin690607@gmail.com" && password === "123456"){
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
  } else {
    alert("帳號或密碼錯誤");
  }
}

function logout(){
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login').style.display = 'block';
}

function addTask(){
  const text = document.getElementById('taskInput').value;
  if(!text) return;

  tasks.push({text, read:false});
  document.getElementById('taskInput').value = "";
  render();
}

function toggleRead(index){
  tasks[index].read = !tasks[index].read;
  render();
}

function deleteTask(index){
  tasks.splice(index,1);
  render();
}

function render(){
  const list = document.getElementById('taskList');
  list.innerHTML = "";

  tasks.forEach((t,i)=>{
    list.innerHTML += `
      <div class="card">
        <b>${t.text}</b><br>
        狀態：${t.read ? "已讀" : "未讀"}<br><br>
        <button onclick="toggleRead(${i})">切換已讀</button>
        <button onclick="deleteTask(${i})">刪除</button>
      </div>
    `;
  });
}
</script>

</body>
</html>
